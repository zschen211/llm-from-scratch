services:
  prometheus:
    # 国内网络环境下可用的 Docker Hub 镜像代理（Daocloud）
    image: docker.m.daocloud.io/prom/prometheus:v2.54.1
    # 让 Prometheus 能写入挂载的 ./data -> /prometheus，避免 permission denied
    user: "0:0"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
  grafana:
    # 国内网络环境下可用的 Docker Hub 镜像代理（Daocloud）
    image: docker.m.daocloud.io/grafana/grafana:11.0.0
    ports:
      - "3000:3000"

